<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab | 윤정훈</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="pages.css" />
    <link rel="stylesheet" href="lab.css" />
  </head>

  <body>
    <nav class="site-nav">
      <a class="brand" href="index.html">YJH</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="experience.html">Experience</a>
        <a href="lab.html">Lab</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <main class="page">
      <section class="container">
        <p class="eyebrow">JavaScript Lab</p>
        <h2>수업 예제 기능 실행하기</h2>
        <p class="page-desc">
          prompt와 document.write 대신 입력창과 결과 영역을 사용해 더 보기 좋은
          실습 도구로 바꿨습니다.
        </p>

        <div class="tool-grid">
          <article class="tool-card">
            <h2>랜덤 뽑기</h2>
            <p>콤마로 구분된 항목 중 하나를 무작위로 선택합니다.</p>
            <label for="randomItems">항목 목록</label>
            <textarea id="randomItems">
과제하기, 복습하기, 산책하기, 커피 마시기, 포트폴리오 다듬기</textarea
            >
            <button
              class="btn primary"
              type="button"
              onclick="pickRandomItem()"
            >
              뽑기
            </button>
            <div id="randomResult" class="result-box">
              결과가 여기에 표시됩니다.
            </div>
          </article>

          <article class="tool-card">
            <h2>D-Day 계산기</h2>
            <p>목표 날짜까지 남은 일수를 계산합니다.</p>
            <label for="targetDate">목표 날짜</label>
            <input id="targetDate" type="date" />
            <button class="btn primary" type="button" onclick="calculateDday()">
              계산하기
            </button>
            <div id="ddayResult" class="result-box">
              목표 날짜를 선택해 주세요.
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer>© <span id="year"></span> 윤정훈</footer>
    <script src="script.js"></script>
  </body>
</html>
